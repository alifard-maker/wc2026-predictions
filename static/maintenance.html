<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="60">
  <title>Updating — WC 2026 Predictions</title>
  <style>
    :root {
      --bg: #0b1a12;
      --text: #eef6f0;
      --muted: #8fb39a;
      --accent: #00c853;
      --gold: #ffc107;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at top, #1a3d28 0%, transparent 55%), linear-gradient(180deg, #08120c 0%, var(--bg) 100%);
      color: var(--text);
      padding: 2rem;
      text-align: center;
    }
    .card {
      max-width: 28rem;
      padding: 2.5rem 2rem;
      border: 1px solid #2a4a35;
      border-radius: 16px;
      background: rgba(20, 38, 26, 0.95);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { margin: 0 0 0.75rem; font-size: 1.5rem; }
    p { margin: 0 0 1rem; color: var(--muted); line-height: 1.6; }
    .timer { color: var(--gold); font-weight: 700; font-size: 1.1rem; }
    .hint { font-size: 0.9rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚽</div>
    <h1>Quick update in progress</h1>
    <p>We&rsquo;re deploying improvements to WC 2026 Predictions. The app will be back shortly.</p>
    <p class="timer">Please try again in about 5 minutes.</p>
    <p class="hint">This page refreshes automatically every minute.</p>
  </div>
</body>
</html>
